# sovereign-backup config for Floki (Romania VPS, AMD64). No USB on a VPS.
host: floki

sources:
  - /home/cipherfox/sovereign-blog
  - /home/cipherfox/sovereign-mcp
  - /etc/caddy
  - /etc/letsencrypt
  - /etc/systemd/system

exclusions:
  - "*/node_modules"
  - "*/.git/objects/pack"
  - "*/dist"
  - "*/.astro"

destinations:
  local: /data/backups
  # Floki uses no USB. Backups are pulled to Sparki via a separate
  # floki-pull script that lives outside this tool.

retention:
  local_days: 7

age_recipient: /etc/sovereign-backup/age-recipient

compressor: auto

pre_hook: ""
post_hook: ""

schedule:
  local_calendar: "*-*-* 01:00:00"
  local_random_delay: 15min
